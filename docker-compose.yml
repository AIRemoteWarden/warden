services:
  warden-server:
    container_name: warden-server
    build:
      context: ./server
    image: ghcr.io/ai-remote-warden/warden-server:latest
    environment:
      WARDEN_CONTROL_ADDR: ":8080"
      WARDEN_PUBLIC_HOST: "https://${WARDEN_SITE_HOST:-localhost:8443}"
    expose:
      - "8080"
    networks:
      default:
        aliases:
          - warden-server

  caddy:
    container_name: warden-caddy
    image: docker.io/library/caddy:2
    depends_on:
      - warden-server
    links:
      - warden-server
    environment:
      WARDEN_SITE_HOST: "${WARDEN_SITE_HOST:-localhost}"
    ports:
      - "${WARDEN_HTTP_PORT:-8080}:80"
      - "${WARDEN_HTTPS_PORT:-8443}:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:

networks:
  default:
    driver: bridge
