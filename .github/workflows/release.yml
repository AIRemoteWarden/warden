name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.vars.outputs.release_tag }}
    steps:
      - id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.release_tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [ -z "$tag" ]; then
            echo "release tag is required" >&2
            exit 1
          fi

          case "$tag" in
            v*) ;;
            *)
              echo "release tag must start with v" >&2
              exit 1
              ;;
          esac

          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"

  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_tag }}
          generate_release_notes: true
          make_latest: true
          target_commitish: ${{ github.sha }}

  release_server:
    name: Publish Server Image
    runs-on: ubuntu-latest
    needs:
      - prepare
      - create_release
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ai-remote-warden/warden-server
          tags: |
            type=raw,value=${{ needs.prepare.outputs.release_tag }}
            type=raw,value=latest

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release_client_linux:
    name: Publish Linux Client Binary
    runs-on: ubuntu-latest
    needs:
      - prepare
      - create_release
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Linux client
        working-directory: ./warden-client
        run: cargo build --release --locked

      - name: Package Linux client
        shell: bash
        run: |
          mkdir -p dist/warden-linux-amd64
          cp warden-client/target/release/warden dist/warden-linux-amd64/warden-client
          chmod +x dist/warden-linux-amd64/warden-client
          tar -C dist -czf warden-linux-amd64.tar.gz warden-linux-amd64

      - name: Upload Linux client to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          files: warden-linux-amd64.tar.gz
